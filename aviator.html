<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Aviator – Crash Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#07091280;--bg1:#0D0F1A;--bg2:#141829;--bg3:#1C2138;--bg4:#242A44;
  --blue:#00C8FF;--green:#00E676;--red:#FF3B3B;--gold:#FFD700;--orange:#FF7A3D;
  --txt:#E2E8F0;--sub:#7A8DB0;--muted:#3A445C;--border:#232B48;
}
html,body{height:100%;background:var(--bg1);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}

/* ── LANDING ─────────────────────────────────────── */
#landing{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a0c2e 0%,#0a0b15 60%,#07090f 100%)}
#landing.out{opacity:0;transform:scale(1.04);transition:opacity .55s ease,transform .55s ease;pointer-events:none}
.l-logo{width:min(220px,60vw);opacity:0;transform:scale(.75);animation:logoIn .7s .25s ease forwards}
.l-sub{margin-top:14px;font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:var(--sub);
  opacity:0;animation:fi .6s .85s ease forwards}
.l-bar{width:min(140px,40vw);height:3px;border-radius:2px;background:var(--bg4);margin-top:36px;overflow:hidden;
  opacity:0;animation:fi .4s 1s ease forwards}
.l-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));animation:fillBar 1.2s 1.05s ease forwards;width:0}
@keyframes logoIn{to{opacity:1;transform:scale(1)}}
@keyframes fi{to{opacity:1}}
@keyframes fillBar{to{width:100%}}

/* ── APP SHELL ────────────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;max-width:500px;margin:0 auto}

/* ── TOPBAR ───────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.tb-logo{font-size:17px;font-weight:900;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.tb-bal{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;
  font-size:13px;font-weight:700;display:flex;gap:4px;align-items:center}
.tb-bal-val{color:var(--green)}
.tb-icons{display:flex;gap:6px}
.iBtn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;user-select:none;transition:background .15s}
.iBtn:active{background:var(--bg4)}

/* ── ROOM TABS ────────────────────────────────────── */
.rtabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex:1;min-width:68px;padding:9px 6px;text-align:center;font-size:11px;font-weight:700;
  color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;user-select:none}
.rtab.active{color:var(--blue);border-bottom-color:var(--blue)}
.rtab-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .2s}
.rtab.flying .rtab-dot{background:var(--green);animation:pdot 1s infinite}
.rtab.crashed .rtab-dot{background:var(--red)}
.rtab.betting .rtab-dot{background:var(--gold)}
.rtab.waiting .rtab-dot{background:var(--sub)}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.25}}

/* ── HISTORY STRIP ────────────────────────────────── */
.hstrip{display:flex;gap:5px;padding:7px 12px;overflow-x:auto;scrollbar-width:none;
  background:var(--bg2);border-bottom:1px solid var(--border)}
.hstrip::-webkit-scrollbar{display:none}
.hchip{flex-shrink:0;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:800;
  font-variant-numeric:tabular-nums}
.hchip.lo{background:rgba(255,59,59,.12);color:#ff7070;border:1px solid rgba(255,59,59,.25)}
.hchip.mi{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.25)}
.hchip.hi{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.hchip.mg{background:rgba(0,200,255,.1);color:var(--blue);border:1px solid rgba(0,200,255,.25)}

/* ── GAME AREA ────────────────────────────────────── */
.game-area{position:relative;height:260px;overflow:hidden;background:#080A15;flex-shrink:0}
#gc{position:absolute;inset:0;width:100%;height:100%}
.plane-wrap{position:absolute;z-index:6;width:52px;height:52px;display:none;transform-origin:center center;will-change:transform,left,top}
.plane-wrap svg{width:52px;height:52px;filter:drop-shadow(0 0 7px rgba(0,200,255,.7))}

/* Clouds */
.cld{position:absolute;opacity:.12;animation:cldmov linear infinite}
@keyframes cldmov{from{transform:translateX(110%)}to{transform:translateX(-220px)}}

/* Multiplier overlay */
.mult-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:10;pointer-events:none;gap:4px}
.mv{font-size:clamp(44px,12vw,68px);font-weight:900;letter-spacing:-1px;
  font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 0 30px currentColor;
  transition:color .25s}
.mv.g{color:var(--green)}.mv.b{color:var(--blue)}.mv.au{color:var(--gold)}.mv.w{color:var(--txt)}
.mv.cr{color:var(--red);animation:shk .35s ease}
.ml{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--sub)}
.crlabel{font-size:13px;letter-spacing:2px;font-weight:800;color:var(--red);margin-top:4px}

/* Countdown ring */
.cdring{width:82px;height:82px;position:relative}
.cdring svg{transform:rotate(-90deg)}
.cdnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:var(--gold)}

/* Screen shake */
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.ga-shake{animation:gashk .4s ease}
@keyframes gashk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ── LIVE FEED ────────────────────────────────────── */
.lfeed{height:34px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;overflow:hidden;gap:0}
.lf-badge{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--red);padding:2px 6px;
  border:1px solid rgba(255,59,59,.35);border-radius:4px;margin:0 10px;flex-shrink:0}
.lf-scroll{flex:1;overflow:hidden;position:relative;height:100%}
.lf-msg{position:absolute;top:50%;transform:translateY(-50%);white-space:nowrap;
  font-size:12px;color:var(--sub);left:0;opacity:1;transition:opacity .35s}
.fn{color:var(--blue);font-weight:700}
.fw{color:var(--green);font-weight:700}
.fl{color:var(--red);font-weight:700}

/* ── BET SECTION ──────────────────────────────────── */
.bsec{padding:12px 14px 14px;background:var(--bg2);margin-top:2px;flex-shrink:0}
.qbtns{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.qb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 2px;
  font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;text-align:center;
  transition:all .12s;user-select:none}
.qb:active{background:var(--blue);color:#fff;border-color:var(--blue);transform:scale(.95)}
.bet-row{display:flex;gap:8px;margin-bottom:10px}
.binp-wrap{flex:1;position:relative}
.bcur{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--sub);font-weight:700;font-size:15px}
.binp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:13px 12px 13px 28px;font-size:20px;font-weight:800;color:var(--txt);outline:none;
  -moz-appearance:textfield}
.binp::-webkit-outer-spin-button,.binp::-webkit-inner-spin-button{-webkit-appearance:none}
.binp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,200,255,.1)}
.auto-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.al{font-size:12px;color:var(--sub);font-weight:600}
.tgl{width:36px;height:20px;border-radius:10px;background:var(--muted);position:relative;
  cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--green)}
.tgl::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;
  position:absolute;top:2px;left:2px;transition:transform .2s}
.tgl.on::after{transform:translateX(16px)}
.ainp{width:68px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:6px 8px;font-size:13px;font-weight:700;color:var(--txt);outline:none}
.ainp:disabled{opacity:.35}

/* Action button */
.abtn{width:100%;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:900;
  letter-spacing:.8px;cursor:pointer;transition:all .18s;text-transform:uppercase;position:relative;overflow:hidden}
.abtn.bet-st{background:linear-gradient(135deg,#00AAFF,#0060FF);color:#fff;
  box-shadow:0 4px 20px rgba(0,170,255,.35)}
.abtn.bet-st:active{transform:scale(.98)}
.abtn.wd-st{background:linear-gradient(135deg,#00E676,#00A040);color:#002510;
  box-shadow:0 4px 24px rgba(0,230,118,.45);animation:wdpulse 1.2s ease infinite}
@keyframes wdpulse{0%,100%{box-shadow:0 4px 24px rgba(0,230,118,.45)}50%{box-shadow:0 4px 36px rgba(0,230,118,.75)}}
.abtn.cancel-st{background:linear-gradient(135deg,#FF7A3D,#FF3B3B);color:#fff}
.abtn.idle-st{background:var(--bg3);color:var(--muted);cursor:default}
.abtn.fly-idle{background:var(--bg4);color:var(--sub);cursor:default}

/* ── TOAST ────────────────────────────────────────── */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);
  padding:11px 22px;border-radius:12px;font-size:16px;font-weight:800;
  opacity:0;transition:all .28s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Confetti */
.conf{position:fixed;top:0;pointer-events:none;z-index:150;border-radius:50%;
  animation:confFall linear forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media(min-width:480px){.game-area{height:310px}.mv{font-size:76px}}
@media(max-width:360px){.qbtns{gap:3px}.qb{font-size:10px;padding:6px 1px}}
</style>
</head>

<div id="landing">
  <img class="l-logo" id="limg" src="https://imgs.search.brave.com/Lq7sbMlRVnUH8RvYQi41JCf6bQIKGRgqyyEiY1D4TRE/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuc2Vla2xvZ28uY29tL2xvZ28tcG5nLzYxLzIvYXZpYXRvci1sb2dvLXBuZ19zZWVrbG9nby02MTg4NTIucG5n" alt="AVIATOR"
    onerror="this.style.display='none';document.getElementById('ltxt').style.display='block'">

<script>
/* ════════════════════════════════════════════════════
   AVIATOR — Full Client-Side Crash Game
   No backend · No dependencies · Open index.html to play
   ════════════════════════════════════════════════════ */

// ── Persist wallet ────────────────────────────────────────
let wallet = parseFloat(localStorage.getItem('av_wallet') || '10000');
let soundOn = true;
let autoOn = false;
let curRoom = 0;

const saveW = () => localStorage.setItem('av_wallet', wallet.toFixed(0));
const updateBal = () => (document.getElementById('balDisp').textContent = Math.floor(wallet).toLocaleString('en-IN'));

// ── Canvas ────────────────────────────────────────────────
const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
let cW = 0, cH = 0;

function resizeCv() {
  const ga = document.getElementById('gameArea');
  cW = gc.width = ga.clientWidth;
  cH = gc.height = ga.clientHeight;
}
window.addEventListener('resize', () => { resizeCv(); drawIdle(); });

// ── Audio (Web Audio API) ─────────────────────────────────
let aCtx = null;
const getAC = () => { if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)(); return aCtx; };

function beep(type) {
  if (!soundOn) return;
  try {
    const ac = getAC();
    const g = ac.createGain();
    g.connect(ac.destination);

    const play = (freq, t0, dur, vol = .08, wave = 'sine') => {
      const o = ac.createOscillator();
      o.type = wave; o.frequency.value = freq;
      const gn = ac.createGain();
      o.connect(gn); gn.connect(ac.destination);
      gn.gain.setValueAtTime(vol, t0);
      gn.gain.exponentialRampToValueAtTime(.001, t0 + dur);
      o.start(t0); o.stop(t0 + dur);
    };

    const t = ac.currentTime;
    if (type === 'bet')     { play(440,t,.08); play(880,t+.08,.12); }
    else if (type === 'to') { play(250,t,.1,'0.07','sawtooth'); play(380,t+.12,.5,'0.05','sawtooth'); }
    else if (type === 'crash') { play(280,t,.12,.12,'square'); play(140,t+.1,.4,.08,'square'); play(80,t+.3,.5,.06,'square'); }
    else if (type === 'win') { [523,659,784,1047].forEach((f,i)=>play(f,t+i*.1,.25,.07)); }
    else if (type === 'click') { play(800,t,.08,.04); }
  } catch(e) {}
}

document.getElementById('sndBtn').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('sndBtn').textContent = soundOn ? '🔊' : '🔇';
});

// ── Crash generation & multiplier ────────────────────────
function genCrash() {
  const r = Math.random();
  if (r < .41) return 1.01 + Math.random() * .47;   // 41% under 1.48
  if (r < .63) return 1.5 + Math.random() * 1.5;    // 22% 1.5–3
  if (r < .79) return 3 + Math.random() * 4;         // 16% 3–7
  if (r < .90) return 7 + Math.random() * 10;        // 11% 7–17
  if (r < .96) return 17 + Math.random() * 23;       //  6% 17–40
  return 40 + Math.random() * 60;                    //  4% 40–100
}

// Exponential growth: mult = e^(k*t), k=0.06
const K = 0.06;
const multAt = t => Math.exp(K * t);

// ── Room class ────────────────────────────────────────────
class Room {
  constructor(id) {
    this.id = id;
    this.phase = 'waiting'; // waiting|betting|flying|crashed
    this.cd = 10;
    this.mult = 1;
    this.crashAt = genCrash();
    this.flyT0 = 0;
    this.history = [];
    this.bet = 0;
    this.cashed = false;
    this._t = null;
    // Stagger room starts so they feel independent
    setTimeout(() => this._wait(), id * 1900 + 300);
  }

  _wait() {
    this.phase = 'waiting';
    tickTab(this.id);
    if (this.id === curRoom) showPhase('waiting');
    clearTimeout(this._t);
    this._t = setTimeout(() => this._bet(), 2200);
  }

  _bet() {
    this.phase = 'betting';
    this.cd = 10;
    this.bet = 0;
    this.cashed = false;
    this.crashAt = genCrash();
    tickTab(this.id);
    if (this.id === curRoom) { showPhase('betting'); updateActBtn(); }
    clearInterval(this._t);
    this._t = setInterval(() => {
      this.cd--;
      if (this.id === curRoom) tickCountdown(this.cd);
      if (this.cd <= 0) { clearInterval(this._t); this._fly(); }
    }, 1000);
  }

  _fly() {
    this.phase = 'flying';
    this.flyT0 = performance.now();
    this.mult = 1;
    tickTab(this.id);
    if (this.id === curRoom) { showPhase('flying'); beep('to'); updateActBtn(); }
  }

  _crash() {
    const finalMult = this.crashAt;
    this.mult = finalMult;
    this.phase = 'crashed';
    if (this.bet > 0 && !this.cashed) {
      if (this.id === curRoom) toast(`Lost ₹${this.bet.toLocaleString('en-IN')} 💥`, 'err');
      feedPush(`<span class='fn'>${rn()}</span> lost <span class='fl'>₹${this.bet.toLocaleString('en-IN')}</span>`);
    }
    this.history.unshift(+finalMult.toFixed(2));
    if (this.history.length > 20) this.history.pop();
    tickTab(this.id);
    if (this.id === curRoom) { doCrash(finalMult); refreshHistory(this.history); beep('crash'); updateActBtn(); }
    clearTimeout(this._t);
    this._t = setTimeout(() => this._wait(), 3200);
  }

  cashOut() {
    if (!this.bet || this.cashed || this.phase !== 'flying') return;
    this.cashed = true;
    const gain = Math.floor(this.bet * this.mult);
    wallet += gain;
    saveW();
    if (this.id === curRoom) {
      toast(`+₹${gain.toLocaleString('en-IN')} at ${this.mult.toFixed(2)}x 🎉`);
      beep('win'); confetti(); updateBal(); updateActBtn();
    }
    feedPush(`<span class='fn'>${rn()}</span> withdrew <span class='fw'>₹${gain.toLocaleString('en-IN')}</span> at ${this.mult.toFixed(2)}x`);
  }
}

const rooms = Array.from({length: 5}, (_, i) => new Room(i));

// ── Master RAF loop ───────────────────────────────────────
// Updates all flying rooms; renders current room
(function masterLoop(now) {
  rooms.forEach(r => {
    if (r.phase !== 'flying') return;
    const t = (now - r.flyT0) / 1000;
    const m = multAt(t);
    // Auto cashout (current room only)
    if (r.id === curRoom && autoOn && r.bet && !r.cashed) {
      const tgt = parseFloat(document.getElementById('autoInp').value) || 2;
      if (m >= tgt) { r.cashOut(); return; }
    }
    if (m >= r.crashAt) { r._crash(); }
    else { r.mult = m; }
  });

  // Render current room if flying
  const cr = rooms[curRoom];
  if (cr.phase === 'flying') {
    renderFlight(cr);
    if (cr.bet && !cr.cashed) dynWdBtn(cr);
  }
  requestAnimationFrame(masterLoop);
})(performance.now());

// ── Canvas rendering ──────────────────────────────────────
let trail = []; // {x,y,a,r} smoke particles

function drawGrid() {
  ctx.strokeStyle = 'rgba(35,43,72,.55)'; ctx.lineWidth = 1;
  for (let x = 0; x < cW; x += 56) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cH); ctx.stroke(); }
  for (let y = 0; y < cH; y += 42) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cW,y); ctx.stroke(); }
}

function drawIdle() {
  ctx.fillStyle = '#080A15'; ctx.fillRect(0,0,cW,cH);
  drawGrid();
}

function renderFlight(r) {
  // Clear
  ctx.fillStyle = '#080A15'; ctx.fillRect(0,0,cW,cH);
  drawGrid();

  const prog = Math.min((r.mult - 1) / Math.max(r.crashAt - 1, .5), .97);
  const sx = 28, sy = cH - 28;
  const ex = sx + (cW - 80) * Math.min(prog * 1.25, 1);
  const ey = sy - (cH - 55) * prog;
  const cpx1 = sx + cW * .12, cpy1 = sy - (cH - 55) * prog * .07;
  const cpx2 = ex - cW * .18, cpy2 = ey + 18;

  // Shadow trail
  ctx.beginPath(); ctx.moveTo(sx,sy);
  ctx.bezierCurveTo(cpx1,cpy1,cpx2,cpy2,ex,ey);
  ctx.strokeStyle = 'rgba(0,200,255,.1)'; ctx.lineWidth = 14; ctx.stroke();

  // Main path
  ctx.shadowBlur = 12; ctx.shadowColor = '#00C8FF';
  ctx.beginPath(); ctx.moveTo(sx,sy);
  ctx.bezierCurveTo(cpx1,cpy1,cpx2,cpy2,ex,ey);
  ctx.strokeStyle = 'rgba(0,200,255,.85)'; ctx.lineWidth = 2.5;
  ctx.lineCap = 'round'; ctx.stroke();
  ctx.shadowBlur = 0;

  // Dot at origin
  ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,200,255,.5)'; ctx.fill();

  // Smoke trail
  for (let i = trail.length-1; i >= 0; i--) {
    const p = trail[i];
    p.x -= .6; p.y += .35; p.a -= .025; p.r += .25;
    if (p.a <= 0) { trail.splice(i,1); continue; }
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(130,145,170,${p.a.toFixed(2)})`; ctx.fill();
  }
  if (Math.random() < .45) trail.push({x:ex-8, y:ey+6, a:.28, r:1.5});

  // Position plane
  const pw = document.getElementById('planeWrap');
  const ang = Math.atan2(ey-cpy2, ex-cpx2) * 180/Math.PI;
  pw.style.left = (ex-26)+'px'; pw.style.top = (ey-26)+'px';
  pw.style.transform = `rotate(${ang}deg)`;

  // Multiplier color
  const mv = document.getElementById('mvEl');
  mv.textContent = r.mult.toFixed(2)+'x';
  if (r.mult < 1.5)      { mv.className='mv w'; mv.style.textShadow=''; }
  else if (r.mult < 3)   { mv.className='mv g'; mv.style.textShadow='0 0 28px #00E676'; }
  else if (r.mult < 7)   { mv.className='mv b'; mv.style.textShadow='0 0 30px #00C8FF'; }
  else                   { mv.className='mv au'; mv.style.textShadow='0 0 40px #FFD700, 0 0 70px #FFD700'; }
}

// ── Crash animation ───────────────────────────────────────
function doCrash(crashVal) {
  document.getElementById('gameArea').classList.add('ga-shake');
  setTimeout(() => document.getElementById('gameArea').classList.remove('ga-shake'), 420);

  // Explosion particles on canvas
  const pw = document.getElementById('planeWrap');
  const px = parseInt(pw.style.left||0)+26, py = parseInt(pw.style.top||0)+26;
  spawnExplosion(px, py);
  document.getElementById('planeWrap').style.display = 'none';

  // Red flash
  ctx.fillStyle = 'rgba(255,59,59,.22)'; ctx.fillRect(0,0,cW,cH);

  showPhase('crashed');
  document.getElementById('crVal').textContent = crashVal.toFixed(2)+'x';
}

function spawnExplosion(ox, oy) {
  const cols = ['#FF3B3B','#FF7A3D','#FFD700','#FF5555'];
  for (let i = 0; i < 22; i++) {
    const ang = (Math.PI*2*i)/22, sp = 2+Math.random()*4;
    const p = {x:ox,y:oy,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,a:1,r:2+Math.random()*4,
               col:cols[Math.floor(Math.random()*cols.length)]};
    let fr = 0;
    const draw = () => {
      fr++; p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.a-=.04; p.r*=.97;
      if (p.a > 0 && fr < 50) {
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.col+Math.floor(p.a*255).toString(16).padStart(2,'0');
        ctx.fill(); requestAnimationFrame(draw);
      }
    };
    requestAnimationFrame(draw);
  }
}

// ── Phase display ─────────────────────────────────────────
function showPhase(p) {
  document.getElementById('ovCountdown').style.display = (p==='waiting'||p==='betting') ? 'flex' : 'none';
  document.getElementById('ovCountdown').style.flexDirection = 'column';
  document.getElementById('ovCountdown').style.alignItems = 'center';
  document.getElementById('ovFly').style.display      = p==='flying'  ? 'block' : 'none';
  document.getElementById('ovCrash').style.display    = p==='crashed' ? 'block' : 'none';
  const pw = document.getElementById('planeWrap');
  if (p === 'flying') { pw.style.display='block'; trail=[]; }
  if (p === 'waiting' || p === 'betting') {
    pw.style.display = 'none';
    pw.style.display = 'none';
    drawIdle();
    document.getElementById('cdNum').textContent = p==='waiting' ? '...' : rooms[curRoom].cd;
    updateCountdownRing(p==='waiting' ? 10 : rooms[curRoom].cd);
    document.querySelector('.mult-ov>.cdring+.ml') && (document.querySelector('.mult-ov .ml').style.display='block');
  }
}

function tickCountdown(n) {
  document.getElementById('cdNum').textContent = n;
  updateCountdownRing(n);
}

function updateCountdownRing(n) {
  const circ = 2*Math.PI*36; // ~226
  const offset = circ * (1 - Math.max(n,0)/10);
  document.getElementById('cdCircle').style.strokeDashoffset = offset;
}

function dynWdBtn(r) {
  const potential = Math.floor(r.bet * r.mult);
  document.getElementById('actBtn').textContent = `WITHDRAW ₹${potential.toLocaleString('en-IN')}`;
}

function updateActBtn() {
  const r = rooms[curRoom];
  const btn = document.getElementById('actBtn');
  if (r.phase === 'waiting') {
    btn.className='abtn idle-st'; btn.textContent='NEXT ROUND...'; btn.disabled=true;
  } else if (r.phase === 'betting') {
    if (r.bet > 0) {
      btn.className='abtn cancel-st'; btn.textContent=`CANCEL  ₹${r.bet.toLocaleString('en-IN')}`;
    } else {
      btn.className='abtn bet-st'; btn.textContent='PLACE BET';
    }
    btn.disabled=false;
  } else if (r.phase === 'flying') {
    if (r.bet > 0 && !r.cashed) {
      const potential = Math.floor(r.bet * r.mult);
      btn.className='abtn wd-st'; btn.textContent=`WITHDRAW ₹${potential.toLocaleString('en-IN')}`;
      btn.disabled=false;
    } else {
      btn.className='abtn fly-idle';
      btn.textContent = r.cashed ? '✓ CASHED OUT' : 'FLYING...';
      btn.disabled=true;
    }
  } else if (r.phase === 'crashed') {
    btn.className='abtn idle-st'; btn.textContent='NEXT ROUND...'; btn.disabled=true;
  }
}

function refreshHistory(hist) {
  const strip = document.getElementById('hstrip');
  strip.innerHTML = hist.map(m => {
    const cls = m<2?'lo':m<5?'mi':m<15?'hi':'mg';
    return `<span class="hchip ${cls}">${m.toFixed(2)}x</span>`;
  }).join('');
}

// ── Room tabs ─────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('rtabs');
  el.innerHTML = rooms.map((r,i)=>`
    <div class="rtab ${i===curRoom?'active':''} ${r.phase}" data-r="${i}">
      <div class="rtab-dot"></div>Room ${i+1}
    </div>`).join('');
}

function tickTab(id) {
  const tabs = document.querySelectorAll('.rtab');
  tabs.forEach((t,i)=>{
    t.className=`rtab ${i===curRoom?'active':''} ${rooms[i].phase}`;
  });
}

document.getElementById('rtabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-r]');
  if (!tab) return;
  const nr = parseInt(tab.dataset.r);
  if (nr === curRoom) return;
  curRoom = nr;
  tickTab(curRoom);
  trail = [];
  const r = rooms[curRoom];
  refreshHistory(r.history);
  showPhase(r.phase);
  if (r.phase === 'betting') tickCountdown(r.cd);
  if (r.phase === 'crashed') document.getElementById('crVal').textContent = r.crashAt.toFixed(2)+'x';
  updateActBtn();
});

// ── Quick bet buttons ─────────────────────────────────────
document.querySelector('.qbtns').addEventListener('click', e => {
  const q = e.target.dataset.q;
  if (!q) return;
  const inp = document.getElementById('betInp');
  let v = parseFloat(inp.value)||0;
  if (q==='100')  v = Math.min(v+100, wallet);
  else if (q==='500') v = Math.min(v+500, wallet);
  else if (q==='h')   v = Math.max(10, Math.floor(v/2));
  else if (q==='2x')  v = Math.min(v*2, wallet);
  else if (q==='max') v = Math.floor(wallet);
  inp.value = Math.max(10, Math.floor(v));
});

// ── Auto toggle ───────────────────────────────────────────
document.getElementById('autoTgl').addEventListener('click', () => {
  autoOn = !autoOn;
  document.getElementById('autoTgl').classList.toggle('on', autoOn);
  document.getElementById('autoInp').disabled = !autoOn;
});

// ── Action button ─────────────────────────────────────────
document.getElementById('actBtn').addEventListener('click', () => {
  const r = rooms[curRoom];
  if (r.phase === 'betting') {
    if (r.bet > 0) {
      // Cancel
      wallet += r.bet; r.bet = 0; saveW(); updateBal(); updateActBtn(); beep('click');
    } else {
      // Place
      const amt = Math.floor(parseFloat(document.getElementById('betInp').value)||0);
      if (amt < 10)       { toast('Minimum bet ₹10', 'err'); return; }
      if (amt > wallet)   { toast('Insufficient balance!', 'err'); return; }
      wallet -= amt; r.bet = amt; saveW(); updateBal(); updateActBtn(); beep('bet');
      feedPush(`<span class='fn'>${rn()}</span> bet <span class='fw'>₹${amt.toLocaleString('en-IN')}</span>`);
    }
  } else if (r.phase === 'flying' && r.bet > 0 && !r.cashed) {
    r.cashOut(); updateActBtn();
  }
});

// ── Toast ─────────────────────────────────────────────────
let tTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='err'
    ? 'linear-gradient(135deg,#FF5555,#CC2222)' : 'linear-gradient(135deg,#00E676,#009940)';
  el.style.color = type==='err' ? '#fff' : '#002510';
  el.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Confetti ──────────────────────────────────────────────
function confetti() {
  const cols = ['#FFD700','#00E676','#00C8FF','#FF7A3D','#FF3B3B','#FFF'];
  for (let i=0;i<45;i++) {
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='conf';
      p.style.cssText=`left:${15+Math.random()*70}vw;width:${4+Math.random()*6}px;
        height:${4+Math.random()*6}px;background:${cols[Math.floor(Math.random()*cols.length)]};
        animation-duration:${1.2+Math.random()*1.8}s;top:-8px`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 3100);
    }, Math.random()*700);
  }
}

// ── Live feed ─────────────────────────────────────────────
const NAMES = ['Rahul','Priya','Aman','Neha','Akash','Vikram','Pooja','Rohit','Ananya','Karan',
               'Deepika','Arjun','Sunita','Manish','Kavya','Rajesh','Shreya','Aditya','Meera','Suresh',
               'Amit','Divya','Gaurav','Isha','Nikhil'];
const rn = () => NAMES[Math.floor(Math.random()*NAMES.length)];
let feedQ = [], feedBusy = false;

function feedPush(html) { feedQ.push(html); if (!feedBusy) feedShow(); }

function feedShow() {
  if (!feedQ.length) { feedBusy=false; return; }
  feedBusy = true;
  const el = document.getElementById('lfMsg');
  el.style.opacity='0';
  setTimeout(()=>{
    el.innerHTML = feedQ.shift();
    el.style.opacity='1';
    setTimeout(feedShow, 2600);
  }, 320);
}

function autoFeed() {
  const r = Math.random();
  const name = rn();
  const amts = [100,200,300,500,1000,2000,5000];
  const amt = amts[Math.floor(Math.random()*amts.length)];
  if (r < .22)      feedPush(`<span class='fn'>${name}</span> joined Room ${Math.ceil(Math.random()*5)}`);
  else if (r < .45) feedPush(`<span class='fn'>${name}</span> bet <span class='fw'>₹${amt.toLocaleString('en-IN')}</span>`);
  else if (r < .65) { const w=amt*(1.5+Math.random()*7)|0; feedPush(`<span class='fn'>${name}</span> won <span class='fw'>₹${w.toLocaleString('en-IN')}</span> 🎉`); }
  else if (r < .80) feedPush(`<span class='fn'>${name}</span> lost <span class='fl'>₹${amt.toLocaleString('en-IN')}</span>`);
  else              feedPush(`<span class='fn'>${name}</span> is watching 👀`);
}
setInterval(autoFeed, 2100);
autoFeed();

// ── Init ──────────────────────────────────────────────────
function initApp() {
  resizeCv();
  drawIdle();
  buildTabs();
  updateBal();
  showPhase('waiting');
  // Kickstart counter for room 0 after a tiny delay
  setTimeout(() => {
    const r = rooms[curRoom];
    if (r.phase === 'betting') tickCountdown(r.cd);
    updateActBtn();
  }, 400);
}

// ── Landing → App ─────────────────────────────────────────
setTimeout(() => {
  const land = document.getElementById('landing');
  land.classList.add('out');
  setTimeout(() => {
    land.style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  }, 580);
}, 2200);
</script>
